<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProfitPilot - Daily Tracking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2fe; --accent: #00ff88; --danger: #ff4b2b; --card: #0f172a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #05070a; color: white; width: 100%; overflow-x: hidden; }

        header { width: 100%; background: #000; }
        .header-img { width: 100%; max-height: 150px; object-fit: contain; display: block; }

        .nav-btns { display: flex; justify-content: center; gap: 10px; padding: 15px; }
        .btn { 
            flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: var(--card); color: #888; font-weight: bold; cursor: pointer; font-size: 0.75rem;
            transition: 0.3s;
        }
        .btn.active { background: linear-gradient(45deg, #4facfe, #00f2fe); color: white; border: none; }
        .btn:hover { border-color: var(--primary); color: white; }

        .crypto-chart-img {
            width: 100%; height: 100px; background: url('https://i.imgur.com/U8hE37H.png') center/cover;
            border-bottom: 2px solid #1e293b;
        }

        .container { padding: 15px; }
        .day-label { color: var(--primary); font-weight: bold; margin-bottom: 10px; display: block; }

        .form-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #1e293b; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; background: #000; border: 1px solid #1e293b; color: white; border-radius: 10px; }

        .submit-btn { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--accent); color: #000; font-weight: bold; }

        /* Progress Stats */
        .progress-box { margin-top: 25px; }
        .progress-bar { width: 100%; height: 10px; background: #1e293b; border-radius: 5px; overflow: hidden; margin: 8px 0; }
        .bar-fill { height: 100%; width: 0%; transition: 1s; }

        /* Overlay */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: none; z-index: 100; padding: 30px;
        }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 2rem; color: var(--danger); cursor: pointer; }

        .history-card { background: #1e293b; padding: 12px; border-radius: 10px; margin-bottom: 10px; }
    </style>
   
   <style>
#langFab{
position:fixed;
bottom:24px;
right:24px;
width:56px;
height:56px;
border-radius:50%;
background:#111827;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,.35);
z-index:9999
}
#langPanel{
position:fixed;
bottom:90px;
right:24px;
background:#1f2937;
border-radius:12px;
overflow:hidden;
display:none;
z-index:9999;
min-width:160px
}
#langPanel button{
display:block;
width:100%;
border:none;
background:transparent;
color:#fff;
padding:10px 14px;
text-align:left;
cursor:pointer
}
#langPanel button:hover{
background:#374151
}
</style>
</head>
<body>

<header><img src="https://i.imgur.com/ICdbmTS.png" class="header-img"></header>

<div class="nav-btns">
    <button class="btn" onclick="window.location.href='index.html'">Business Analysis</button>
    <button class="btn active">My Daily Analysis</button>
</div>



<main class="container">
    <div id="formSection">
        <span class="day-label" id="dayDisplay">DAY 1</span>
        <div class="form-card">
            <div class="input-group"><label>CAPITAL (₦)</label><input type="number" id="dCap"></div>
            <div class="input-group"><label>COST (₦)</label><input type="number" id="dCost"></div>
            <div class="input-group"><label>SELLING PRICE (₦)</label><input type="number" id="dSales"></div>
            <button class="submit-btn" onclick="saveData()">SUBMIT DAY DATA</button>
        </div>
    </div>

    <div id="waitMessage" class="hidden" style="text-align: center; padding: 40px;">
        <i class="fas fa-lock fa-3x" style="color:var(--primary)"></i>
      <p style="margin-top:10px;">
Every record you track brings you closer to a smarter and more profitable business.
</p>
    </div>
    
    
    
    <div id="bizStats" style="margin-top:25px;display:grid;grid-template-columns:1fr 1fr;gap:10px">

<div style="background:#0f172a;padding:15px;border-radius:12px">
<small>Total Capital</small>
<h3 id="totalCap">₦0</h3>
</div>

<div style="background:#0f172a;padding:15px;border-radius:12px">
<small>Total Cost</small>
<h3 id="totalCost">₦0</h3>
</div>

<div style="background:#0f172a;padding:15px;border-radius:12px">
<small>Total Sales</small>
<h3 id="totalSales">₦0</h3>
</div>

<div style="background:#0f172a;padding:15px;border-radius:12px">
<small>Profit Status</small>
<h3 id="profitStatus">₦0</h3>
</div>

</div>


<div style="margin-top:20px;background:#0f172a;padding:20px;border-radius:14px;text-align:center">

<div style="font-size:40px" id="trendIcon">➖</div>

<div id="trendText" style="margin-top:8px;font-weight:bold">
Business Neutral
</div>

</div>



    
    

    <div class="progress-box">
        <small>Capital Flow</small><div class="progress-bar"><div id="capBar" class="bar-fill" style="background:var(--primary)"></div></div>
        <small>Total Cost</small><div class="progress-bar"><div id="costBar" class="bar-fill" style="background:var(--danger)"></div></div>
        <small>Profit Volume</small><div class="progress-bar"><div id="saleBar" class="bar-fill" style="background:var(--accent)"></div></div>
    </div>

    <div style="display:flex; gap:10px; margin-top:20px;">
        <button class="btn" onclick="showHistory()" style="background:var(--primary); color:#000;"><i class="fas fa-database"></i> History</button>
        <button class="btn" onclick="askAI()" style="background:var(--accent); color:#000;"><i class="fas fa-robot"></i> AI Report</button>
    </div>
    
    
    <button onclick="resetData()" 
style="
width:100%;
margin-top:30px;
padding:12px;
border-radius:10px;
border:1px solid #374151;
background:#0f172a;
color:#ff4b2b;
font-weight:bold;
cursor:pointer;
transition:0.3s;
">

<i class="fas fa-trash"></i> RESET ALL RECORDS

</button>

 
</main>

<div id="overlay">
    <span class="close-btn" onclick="document.getElementById('overlay').style.display='none'">&times;</span>
    <h3 style="color:var(--primary); margin-bottom:20px;">Business Records</h3>
    <div id="historyList"></div>
</div>

<!-- AI Result Panel -->
<div id="aiPanel" style="
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0f172a;
border-top:2px solid #1e293b;
padding:20px;
display:none;
z-index:9999;
max-height:50%;
overflow-y:auto;
box-shadow:0 -4px 15px rgba(0,0,0,0.5);
">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
<b style="color:#00f2fe;font-size:16px">AI Business Advice</b>

<button onclick="clearAI()" style="
background:#ff4b2b;
border:none;
color:#fff;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:14px;
transition:0.3s;
">
<i class="fas fa-times"></i> Clear
</button>

</div>

<div id="aiContent" style="line-height:1.6;font-size:14px;color:#fff"></div>

</div>


<div id="langFab">🌐</div>
<div id="langPanel">
<button data-lang="auto">Auto</button>
<button data-lang="en">English</button>
<button data-lang="ha">Hausa</button>
<button data-lang="yo">Yoruba</button>
<button data-lang="ig">Igbo</button>
</div>

<script type="module">

function showNotify(msg,color="bg-blue-600"){
let container=document.getElementById('notification-container')
if(!container){
container=document.createElement('div')
container.id='notification-container'
container.style.position="fixed"
container.style.top="20px"
container.style.right="20px"
container.style.zIndex="9999"
document.body.appendChild(container)
}

const toast=document.createElement('div')
toast.style.background="#111"
toast.style.color="#fff"
toast.style.padding="10px 14px"
toast.style.borderRadius="8px"
toast.style.marginBottom="8px"
toast.innerText=msg

container.appendChild(toast)

setTimeout(()=>{toast.remove()},4000)
}

async function callAI(data,type){

const lang=localStorage.getItem("pp_lang") || "en"

try{

const response=await fetch("https://propitpilot.pages.dev/api/daily",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
payload:{...data,lang},
password:"@haruna66",
type:type
})
})

const result=await response.json()

if(result.error){
throw new Error(result.error)
}

return result.text

}catch(err){
showNotify("Connection error. Please try again!")
return null
}

}

let logs=JSON.parse(localStorage.getItem('biz_logs'))||[]

const lastEntry=localStorage.getItem("last_entry")

function initPage(){

document.getElementById("dayDisplay").innerText="DAY "+(logs.length+1)

if(logs.length>0){
const capField=document.getElementById("dCap").parentElement
capField.style.display="none"
}

updateBusinessStats()
updateProgress()

}


function updateBusinessStats(){

let totalCap=0
let totalCost=0
let totalSales=0

logs.forEach(l=>{
totalCap+=Number(l.cap)
totalCost+=Number(l.cost)
totalSales+=Number(l.sale)
})

const profit=totalSales-totalCost
const roi=((profit/totalCost)*100).toFixed(1)


document.getElementById("totalCap").innerText="₦"+totalCap.toLocaleString()
document.getElementById("totalCost").innerText="₦"+totalCost.toLocaleString()
document.getElementById("totalSales").innerText="₦"+totalSales.toLocaleString()

const status=document.getElementById("profitStatus")
const icon=document.getElementById("trendIcon")
const text=document.getElementById("trendText")

status.innerText="₦"+profit.toLocaleString()

if(profit>0){
status.style.color="#00ff88"
icon.innerText="📈"
text.innerText="Business Growing"
text.innerText="ROI "+roi+"% Performance"
}

else if(profit<0){
status.style.color="#ff4b2b"
icon.innerText="📉"
text.innerText="Business Losing Money"
}

else{
status.style.color="#ccc"
icon.innerText="➖"
text.innerText="Business Neutral"
}

}

function updateProgress(){

let totalCap=0
let totalCost=0
let totalSales=0

logs.forEach(l=>{
totalCap+=Number(l.cap)
totalCost+=Number(l.cost)
totalSales+=Number(l.sale)
})

const max=Math.max(totalCap,totalCost,totalSales,1)

document.getElementById("capBar").style.width=(totalCap/max*100)+"%"
document.getElementById("costBar").style.width=(totalCost/max*100)+"%"
document.getElementById("saleBar").style.width=(totalSales/max*100)+"%"

document.getElementById("capBar").title="₦"+totalCap.toLocaleString()
document.getElementById("costBar").title="₦"+totalCost.toLocaleString()
document.getElementById("saleBar").title="₦"+totalSales.toLocaleString()

}

window.saveData=()=>{

let capInput=document.getElementById('dCap')
let cost=document.getElementById('dCost').value
let sales=document.getElementById('dSales').value

let cap=capInput?capInput.value:logs[0].cap

if(!cost||!sales)return showNotify("Please fill all daily records!")

if(logs.length===0){
if(!cap)return showNotify("Please enter starting capital")
}

logs.push({
day:logs.length+1,
cap:cap,
cost:cost,
sale:sales,
time:Date.now()
})

localStorage.setItem('biz_logs',JSON.stringify(logs))
localStorage.setItem('last_entry',Date.now())

showNotify("Daily entry saved")

setTimeout(()=>location.reload(),800)

}


window.resetData=()=>{
if(confirm("Are you sure you want to delete all data?")){
localStorage.clear()
location.reload()
}
}

window.clearAI=()=>{

document.getElementById("aiContent").innerHTML=""
document.getElementById("aiPanel").style.display="none"

}

window.clearAI=()=>{

document.getElementById("aiContent").innerHTML=""
document.getElementById("aiPanel").style.display="none"

}

window.showHistory=()=>{

const overlay=document.getElementById("overlay")
const list=document.getElementById("historyList")

overlay.style.display="block"

list.innerHTML=""

logs.slice().reverse().forEach(l=>{

const div=document.createElement("div")
div.className="history-card"

div.innerHTML=`
Day ${l.day}<br>
Capital: ₦${Number(l.cap).toLocaleString()}<br>
Cost: ₦${Number(l.cost).toLocaleString()}<br>
Sales: ₦${Number(l.sale).toLocaleString()}
`

list.appendChild(div)

})

}


window.askAI=async()=>{

if(logs.length===0){
showNotify("No business records found")
return
}

showNotify("AI is analyzing your business...")

const lang=localStorage.getItem("pp_lang") || "en"

const aiResponse=await callAI({
logs:logs,
days:logs.length,
language:lang
},"daily")

if(!aiResponse){
showNotify("AI response failed")
return
}

const panel=document.getElementById("aiPanel")
const content=document.getElementById("aiContent")

content.innerText=aiResponse

panel.style.display="block"

}


const fab=document.getElementById("langFab")
const panel=document.getElementById("langPanel")

fab.onclick=()=>{
panel.style.display=panel.style.display==="block"?"none":"block"
}

document.querySelectorAll("#langPanel button").forEach(btn=>{
btn.onclick=()=>{
const lang=btn.dataset.lang
localStorage.setItem("pp_lang",lang)
panel.style.display="none"
showNotify("Language saved")
}
})

initPage()

</script>
</body>
</html>
