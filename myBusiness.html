<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProfitPilot - Daily Tracking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2fe; --accent: #00ff88; --danger: #ff4b2b; --card: #0f172a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #05070a; color: white; width: 100%; overflow-x: hidden; }

        header { width: 100%; background: #000; }
        .header-img { width: 100%; max-height: 150px; object-fit: contain; display: block; }

        .nav-btns { display: flex; justify-content: center; gap: 10px; padding: 15px; }
        .btn { 
            flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: var(--card); color: #888; font-weight: bold; cursor: pointer; font-size: 0.75rem;
            transition: 0.3s;
        }
        .btn.active { background: linear-gradient(45deg, #4facfe, #00f2fe); color: white; border: none; }
        .btn:hover { border-color: var(--primary); color: white; }

        .crypto-chart-img {
            width: 100%; height: 100px; background: url('https://i.imgur.com/U8hE37H.png') center/cover;
            border-bottom: 2px solid #1e293b;
        }

        .container { padding: 15px; }
        .day-label { color: var(--primary); font-weight: bold; margin-bottom: 10px; display: block; }

        .form-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #1e293b; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; background: #000; border: 1px solid #1e293b; color: white; border-radius: 10px; }

        .submit-btn { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--accent); color: #000; font-weight: bold; }

        /* Progress Stats */
        .progress-box { margin-top: 25px; }
        .progress-bar { width: 100%; height: 10px; background: #1e293b; border-radius: 5px; overflow: hidden; margin: 8px 0; }
        .bar-fill { height: 100%; width: 0%; transition: 1s; }

        /* Overlay */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: none; z-index: 100; padding: 30px;
        }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 2rem; color: var(--danger); cursor: pointer; }

        .history-card { background: #1e293b; padding: 12px; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<header><img src="https://i.imgur.com/ICdbmTS.png" class="header-img"></header>

<div class="nav-btns">
    <button class="btn" onclick="window.location.href='index.html'">Business Analysis</button>
    <button class="btn active">My Daily Analysis</button>
</div>



<main class="container">
    <div id="formSection">
        <span class="day-label" id="dayDisplay">DAY 1</span>
        <div class="form-card">
            <div class="input-group"><label>CAPITAL (₦)</label><input type="number" id="dCap"></div>
            <div class="input-group"><label>COST (₦)</label><input type="number" id="dCost"></div>
            <div class="input-group"><label>SELLING PRICE (₦)</label><input type="number" id="dSales"></div>
            <button class="submit-btn" onclick="saveData()">SUBMIT DAY DATA</button>
        </div>
    </div>

    <div id="waitMessage" class="hidden" style="text-align: center; padding: 40px;">
        <i class="fas fa-lock fa-3x" style="color:var(--primary)"></i>
        <p style="margin-top:10px;">An adana bayanan yau. Dawo bayan awa 24!</p>
    </div>

    <div class="progress-box">
        <small>Capital Flow</small><div class="progress-bar"><div id="capBar" class="bar-fill" style="background:var(--primary)"></div></div>
        <small>Total Cost</small><div class="progress-bar"><div id="costBar" class="bar-fill" style="background:var(--danger)"></div></div>
        <small>Profit Volume</small><div class="progress-bar"><div id="saleBar" class="bar-fill" style="background:var(--accent)"></div></div>
    </div>

    <div style="display:flex; gap:10px; margin-top:20px;">
        <button class="btn" onclick="showHistory()" style="background:var(--primary); color:#000;"><i class="fas fa-database"></i> History</button>
        <button class="btn" onclick="askAI()" style="background:var(--accent); color:#000;"><i class="fas fa-robot"></i> AI Report</button>
    </div>

    <button onclick="resetData()" style="width:100%; margin-top:30px; border:none; background:transparent; color:#444; font-size:0.7rem;">RESET ALL RECORDS</button>
</main>

<div id="overlay">
    <span class="close-btn" onclick="document.getElementById('overlay').style.display='none'">&times;</span>
    <h3 style="color:var(--primary); margin-bottom:20px;">Business Records</h3>
    <div id="historyList"></div>
</div>

<script type="importmap">{ "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }</script>
<script type="module">
    import { callAI, showNotify } from './pro.js';

    let logs = JSON.parse(localStorage.getItem('biz_logs')) || [];

    window.saveData = () => {
        const c = document.getElementById('dCap').value;
        const co = document.getElementById('dCost').value;
        const s = document.getElementById('dSales').value;

        if(!c || !co || !s) return showNotify("Please fill all daily records!", "bg-red-500");

        logs.push({ day: logs.length+1, cap: c, cost: co, sale: s, time: Date.now() });
        localStorage.setItem('biz_logs', JSON.stringify(logs));
        localStorage.setItem('last_entry', Date.now());
        
        showNotify("Daily entry saved!");
        setTimeout(() => location.reload(), 1500);
    }

    window.askAI = async () => {
        if(logs.length === 0) return showNotify("No logs found to analyze.", "bg-yellow-600");
        
        showNotify("AI analysis started. Please wait...");
        const aiResponse = await callAI({ logs, days: logs.length }, "daily");
        if (aiResponse) {
            showNotify("Analysis complete!");
            alert(aiResponse); // Zaka iya sanya wannan a modal idan kana so
        }
    }

    window.resetData = () => { 
        if(confirm("Are you sure you want to delete all data?")) { 
            localStorage.clear(); 
            showNotify("All data cleared!", "bg-red-600");
            location.reload(); 
        } 
    }
</script>
</body>
</html>
