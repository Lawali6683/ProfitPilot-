<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProfitPilot AI</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --accent: #10b981;
            --danger: #ff4b2b;
            --dark-bg: #05070a; 
            --card-bg: #0f172a;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
            width: 100%;
        }

        /* Header Image Section */
        header {
            width: 100%;
            text-align: center;
            background: #000;
        }

        .header-img {
            width: 100%;
            max-height: 70px;
            object-fit: contain; 
            display: block;
        }

        /* Description Image Section */
        .desc-section {
            width: 100%;
            background: #000;
            padding-bottom: 20px;
        }

        .desc-img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 10px;
        }

        .desc-text {
            padding: 0 20px;
            font-size: 0.9rem;
            color: #cbd5e1;
            text-align: center;
        }

        /* Navigation Buttons */
        .nav-btns {
            display: flex;
            justify-content: space-around;
            padding: 20px 10px;
            gap: 10px;
        }

        .nav-btn {
            flex: 1;
            padding: 12px 5px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--card-bg);
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .nav-btn.active {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        /* Form Container */
        .container {
            padding: 15px;
            width: 100%;
        }

        .form-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: var(--primary); }
        
        .input-group input, .input-group select {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #1e293b;
            background: #05070a;
            color: white;
            font-size: 1rem;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

       
        .results-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            width: 100%;
            padding: 20px;
            border-radius: 15px;
            background: #0f172a;
            border-left: 5px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.5s ease-in;
        }

        .stat-card.lg { border-color: var(--primary); height: 100px; }
        .stat-card.md { border-color: var(--accent); height: 80px; }
        .stat-card.sm { border-color: var(--danger); height: 60px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .ai-box {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.02);
            border-radius: 15px;
            border: 1px dashed var(--glass-border);
        }

        .chart-box { margin-top: 20px; background: #000; padding: 10px; border-radius: 15px; }

        .hidden { display: none; }

        .notification {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <img src="https://i.imgur.com/ICdbmTS.png" alt="Header" class="header-img">
    </header>

    <div class="desc-section">
          
        <img src="https://i.imgur.com/pyzdn8J.png" alt="Business" class="desc-img">
        <p class="desc-text">ProfitPilot AI helps you calculate your profit/loss and provides smart growth advice based on real-time data.</p>
    </div>

    <div class="nav-btns">
        <button class="nav-btn active">Dashboard</button>
        <button class="nav-btn" onclick="window.location.href='myBusiness.html'">My Analysis</button>
    </div>

    <main class="container">
        <section id="inputSection" class="form-card">
            <div class="input-group">
                <label><i class="fas fa-language"></i> SELECT LANGUAGE</label>
                <select id="language">
                    <option value="English">English</option>
                    <option value="Hausa">Hausa</option>
                    <option value="Yoruba">Yoruba</option>
                    <option value="Igbo">Igbo</option>
                </select>
            </div>

            <div class="input-group">
                <label>CAPITAL (₦)</label>
                <input type="number" id="capital" placeholder="Enter Capital">
            </div>
            <div class="input-group">
                <label>TOTAL COST (₦)</label>
                <input type="number" id="cost" placeholder="Enter Cost">
            </div>
            <div class="input-group">
                <label>TOTAL SALES (₦)</label>
                <input type="number" id="sales" placeholder="Enter Sales">
            </div>

            <button id="submitBtn" class="submit-btn">ANALYZE NOW <i class="fas fa-chart-pie"></i></button>
        </section>

        <section id="resultSection" class="hidden">
            <div class="results-list">
                <div class="stat-card lg">
                    <span>CAPITAL</span>
                    <h2 id="resCap">₦0</h2>
                </div>
                <div class="stat-card md">
                    <span>TOTAL COST</span>
                    <h2 id="resCost">₦0</h2>
                </div>
                <div class="stat-card sm">
                    <span>REVENUE</span>
                    <h2 id="resSales">₦0</h2>
                </div>
            </div>

            <div class="chart-box">
                <canvas id="profitChart"></canvas>
            </div>

            <div class="ai-box">
                <h4 style="color: var(--primary);"><i class="fas fa-robot"></i> AI ADVICE:</h4>
                <p id="aiText" style="font-size: 0.9rem; margin-top: 10px;">Calculating...</p>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="copyData()" class="nav-btn" style="flex: 1;"><i class="fas fa-copy"></i> Copy</button>
                <button onclick="location.reload()" class="nav-btn" style="flex: 1; border-color: var(--danger);"><i class="fas fa-trash"></i> Reset</button>
            </div>
        </section>
    </main>

    <div id="notification" class="notification">Done!</div>
    <audio id="alertSound" src="alam.mp3"></audio>

   
   <script type="module">

function showNotify(msg, color = "bg-blue-600") {
    let container = document.getElementById('notification-container');
    if (!container) {
        container = document.createElement('div');
        container.id = 'notification-container';
        container.className = "fixed top-5 right-5 z-50 pointer-events-none";
        document.body.appendChild(container);
    }

    const toast = document.createElement('div');
    toast.className = `${color} text-white px-6 py-4 rounded-xl shadow-2xl mb-3 transition-all duration-500 transform translate-x-10 opacity-0 flex items-center gap-3 pointer-events-auto`;
    toast.innerHTML = `<i class="fas fa-bell"></i> <span class="font-medium">${msg}</span>`;
    
    container.appendChild(toast);

    setTimeout(() => {
        toast.classList.remove('translate-x-10','opacity-0');
        toast.classList.add('translate-x-0','opacity-100');
    },100);

    setTimeout(() => {
        toast.classList.replace('opacity-100','opacity-0');
        setTimeout(()=>toast.remove(),500);
    },4000);
}

async function callAI(data,type){
    try{
        const response = await fetch("https://propitpilot.pages.dev/api/pro",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                payload:data,
                password:"@haruna66",
                type:type
            })
        });

        const result = await response.json();

        if(result.error){
            throw new Error(result.error);
        }

        return result.text;

    }catch(err){
        showNotify("Connection error. Please try again!","bg-red-600");
        return null;
    }
}

document.getElementById('submitBtn').addEventListener('click',async()=>{

    const cap = document.getElementById('capital').value;
    const cost = document.getElementById('cost').value;
    const sales = document.getElementById('sales').value;
    const lang = document.getElementById('language').value;

    if(!cap || !cost || !sales){
        showNotify("Please fill all business fields!","bg-red-500");
        return;
    }

    document.getElementById('inputSection').classList.add('hidden');
    document.getElementById('resultSection').classList.remove('hidden');
    document.getElementById('alertSound').play();

    document.getElementById('resCap').innerText=`₦${Number(cap).toLocaleString()}`;
    document.getElementById('resCost').innerText=`₦${Number(cost).toLocaleString()}`;
    document.getElementById('resSales').innerText=`₦${Number(sales).toLocaleString()}`;

    new Chart(document.getElementById('profitChart'),{
        type:'bar',
        data:{
            labels:['Capital','Cost','Sales'],
            datasets:[{
                data:[cap,cost,sales],
                backgroundColor:['#00d2ff','#10b981','#ff4b2b']
            }]
        },
        options:{
            responsive:true,
            plugins:{
                legend:{display:false}
            }
        }
    });

    const aiResponse = await callAI({cap,cost,sales,lang},"index");

    document.getElementById('aiText').innerText = aiResponse || "AI analysis failed.";
});

window.copyData = ()=>{
    navigator.clipboard.writeText(document.getElementById('aiText').innerText);
    showNotify("Report copied successfully!");
}

</script>
</body>
</html>
